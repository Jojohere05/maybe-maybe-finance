name: FinGuard Compliance Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  finguard-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo (this fork)
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Checkout FinGuard scanner (PBL-2 backend)
        uses: actions/checkout@v4
        with:
          repository: Jojohere05/PBL-2
          path: finguard-scanner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install scanner dependencies
        working-directory: finguard-scanner
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install packaging

      - name: Run FinGuard scan
        working-directory: finguard-scanner
        run: |
          python -m finguard.main "$GITHUB_WORKSPACE/target-repo"

      - name: Upload FinGuard result
        uses: actions/upload-artifact@v4
        with:
          name: finguard-result
          path: finguard-scanner/result.json

      - name: Comment on PR with summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('finguard-scanner/result.json', 'utf8'));
            const s = result.summary || {};
            const sev = s.by_severity || {};
            const body = [
              '### 🛡️ FinGuard Compliance Scan',
              '',
              `**Decision:** ${result.decision} (risk ${result.risk_score}/100)`,
              '',
              '| Severity | Count |',
              '|----------|-------|',
              `| CRITICAL | ${sev.CRITICAL || 0} |`,
              `| HIGH     | ${sev.HIGH || 0} |`,
              `| MEDIUM   | ${sev.MEDIUM || 0} |`,
              `| LOW      | ${sev.LOW || 0} |`,
              '',
              '| Type         | Count |',
              '|--------------|-------|',
              `| Secrets      | ${s.secrets || 0} |`,
              `| Dependencies | ${s.dependencies || 0} |`,
              `| Terraform    | ${s.terraform || 0} |`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.name,
              issue_number: context.issue.number,
              body
            });
