name: FinGuard Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip repository
        run: |
          zip -r repo.zip . \
            -x "*.git*" \
               "node_modules/*" \
               "dist/*" \
               "build/*"

      - name: Call FinGuard backend and print report
        env:
          BACKEND_URL: ${{ secrets.FINGUARD_API_URL }}
        run: |
          if [ -z "${BACKEND_URL}" ]; then
            echo "ERROR: FINGUARD_API_URL secret is not set"
            exit 1
          fi

          echo "Calling FinGuard at: ${BACKEND_URL}/api/scan/"

          curl -sS -L -f \
            -X POST \
            -F "file=@repo.zip" \
            "${BACKEND_URL}/api/scan/" \
            -o finguard-result.json

          python - << 'PY'
          import json, sys

          with open("finguard-result.json", "r", encoding="utf-8") as f:
              result = json.load(f)

          score = result.get("risk_score", 0)
          decision = result.get("decision", "ALLOW")
          context = result.get("context", {})
          summary = result.get("summary", {}) or {}
          by_sev = summary.get("by_severity", {}) or {}

          line = "═" * 58
          print(line)
          print("  FinGuard Compliance Scan")
          print(line)
          print(f"  Risk Score : {score}/100")
          print(f"  Decision   : {decision}")
          if result.get("amplified"):
              print("  Amplified  : YES (fintech + sensitivity boost)")

          print("\n  Context:")
          print(f"    Terraform : {bool(context.get('has_terraform'))}")
          print(f"    Fintech   : {bool(context.get('is_fintech'))}")
          print(f"    Docker    : {bool(context.get('has_docker'))}")
          print(f"    Deps      : {bool(context.get('has_dependencies'))}")

          print("\n  Violations:")
          print(f"    CRITICAL : {by_sev.get('CRITICAL', 0)}")
          print(f"    HIGH     : {by_sev.get('HIGH', 0)}")
          print(f"    MEDIUM   : {by_sev.get('MEDIUM', 0)}")
          print(f"    LOW      : {by_sev.get('LOW', 0)}")
          print(f"    Secrets  : {summary.get('secrets', 0)}")
          print(f"    CVEs     : {summary.get('dependencies', 0)}")
          print(f"    Terraform: {summary.get('terraform', 0)}")
          print(f"    Dismissed: {summary.get('dismissed', 0)}")
          print(f"    Escalated: {summary.get('escalated', 0)}")

          print("\n  GitHub Actions View:")
          print("  " + "=" * 52)
          print("    FinGuard Compliance Scan")
          print("  " + "=" * 52)
          print(f"    Risk Score : {score}/100")
          print(f"    Decision   : {decision}")
          print(f"    CRITICAL   : {by_sev.get('CRITICAL', 0)}")
          print(f"    HIGH       : {by_sev.get('HIGH', 0)}")
          print("  " + "=" * 52)

          if decision == "BLOCK":
              print("\n  🚫 Pipeline BLOCKED - fix CRITICAL issues before merge")
              sys.exit(1)
          elif decision == "REVIEW":
              print("\n  🔍 REVIEW required (non-blocking for now)")
          elif decision == "WARN":
              print("\n  ⚠️  WARNING - not blocking, but review recommended")
          else:
              print("\n  ✅ ALLOW - all checks passed")
          PY

      - name: Upload FinGuard result JSON
        uses: actions/upload-artifact@v4
        with:
          name: finguard-result
          path: finguard-result.json
