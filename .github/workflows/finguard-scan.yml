name: FinGuard Compliance Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1️⃣ Checkout target repo (the repo being scanned)
      - name: Checkout target repository
        uses: actions/checkout@v4

      # 2️⃣ Checkout your FinGuard backend repo
      - name: Checkout FinGuard engine (PBL-2)
        uses: actions/checkout@v4
        with:
          repository: Jojohere05/PBL-2
          path: finguard

      # 3️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4️⃣ Install dependencies
      - name: Install FinGuard dependencies
        working-directory: finguard
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5️⃣ Start backend
      - name: Start FastAPI backend
        working-directory: finguard
        env:
          PORT: "8000"
        run: |
          nohup python -m uvicorn api.main:app --host 0.0.0.0 --port ${PORT} > uvicorn.log 2>&1 &

          echo "Waiting for backend..."
          for i in {1..30}; do
            if curl -fsS "http://127.0.0.1:8000/health" >/dev/null 2>&1; then
              echo "Backend is ready ✅"
              break
            fi
            sleep 1
          done

      # 6️⃣ Zip repo to scan
      - name: Zip repository
        run: |
          zip -r repo.zip . \
            -x ".git/*" "finguard/*" "node_modules/*" "dist/*" "build/*" "__pycache__/*"

      # 7️⃣ Call API directly (NO nginx needed 🚀)
      - name: Call FinGuard API
        run: |
          STATUS=$(curl -sS -L -w "%{http_code}" -o finguard-result.json \
            -X POST \
            -F "file=@repo.zip" \
            "http://127.0.0.1:8000/api/scan/")

          echo "HTTP status: ${STATUS}"
          cat finguard-result.json || true

          if [ "${STATUS}" != "200" ]; then
            echo "API failed ❌"
            exit 1
          fi

      # 8️⃣ Print summary
      - name: Print FinGuard summary
        working-directory: finguard
        run: |
          cp ../finguard-result.json ./finguard-result.json
          python scripts/print_finguard_summary.py

      # 9️⃣ Enforce decision (dynamic, NOT hardcoded)
      - name: Enforce policy
        run: |
          python - << 'PY'
          import json, sys, os

          with open('finguard-result.json') as f:
              data = json.load(f)

          decision = str(data.get("decision", "ALLOW")).upper()
          fail_on = os.getenv("FAIL_ON", "BLOCK")

          print(f"\nDecision: {decision}")

          if decision == fail_on:
              print("❌ Pipeline blocked")
              sys.exit(1)
          else:
              print("✅ Pipeline allowed")
          PY

      # 🔟 Upload results
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: finguard-result
          path: |
            finguard-result.json
            finguard/finguard-result.json
            finguard/test_results/*.json
